<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Space Shooter</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050510; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: white; user-select: none; }
        canvas { display: block; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .hidden { display: none !important; }
        #main-menu { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; background: rgba(10, 10, 25, 0.8); padding: 40px; border-radius: 20px; border: 1px solid rgba(34, 211, 238, 0.3); box-shadow: 0 0 30px rgba(34, 211, 238, 0.2); pointer-events: auto; backdrop-filter: blur(10px); }
        h1 { color: #22d3ee; text-shadow: 0 0 10px #22d3ee; margin-top: 0; font-size: 2.5rem; letter-spacing: 2px; }
        .level-btn { background: transparent; border: 2px solid; padding: 12px 30px; margin: 10px; font-size: 1.2rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: all 0.3s; text-transform: uppercase; }
        #btn-easy { color: #4ade80; border-color: #4ade80; }
        #btn-easy:hover { background: rgba(74, 222, 128, 0.2); box-shadow: 0 0 15px #4ade80; }
        #btn-normal { color: #facc15; border-color: #facc15; }
        #btn-normal:hover { background: rgba(250, 204, 21, 0.2); box-shadow: 0 0 15px #facc15; }
        #btn-hard { color: #f87171; border-color: #f87171; }
        #btn-hard:hover { background: rgba(248, 113, 113, 0.2); box-shadow: 0 0 15px #f87171; }
        #hud { position: absolute; top: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between; font-size: 1.5rem; font-weight: bold; text-shadow: 0 0 5px rgba(255,255,255,0.5); }
        #score-display { color: #22d3ee; }
        #combo-display { color: #facc15; opacity: 0; transition: opacity 0.2s; }
        .combo-active { opacity: 1 !important; }
        #health-bar-container { width: 200px; height: 20px; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 10px; overflow: hidden; }
        #health-bar { width: 100%; height: 100%; background: #4ade80; box-shadow: 0 0 10px #4ade80; transition: width 0.2s, background-color 0.2s; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="ui-layer">
        <div id="hud" class="hidden">
            <div>
                <div id="score-display">SCORE: 0</div>
                <div id="combo-display">COMBO x1</div>
            </div>
            <div id="health-bar-container">
                <div id="health-bar"></div>
            </div>
        </div>
        <div id="main-menu">
            <h1>NEON ASSAULT</h1>
            <p>Select Difficulty</p>
            <button id="btn-easy" class="level-btn" onclick="startGame('easy')">Easy</button>
            <button id="btn-normal" class="level-btn" onclick="startGame('normal')">Normal</button>
            <button id="btn-hard" class="level-btn" onclick="startGame('hard')">Hard</button>
        </div>
    </div>

<script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        
        const R = () => Math.random();

        let width, height;
        let gameState = 'menu';
        let difficultyData = {
            easy: { hpMult: 0.5, speedMult: 0.8, spawnRate: 1500 },
            normal: { hpMult: 1.0, speedMult: 1.0, spawnRate: 1000 },
            hard: { hpMult: 1.5, speedMult: 1.3, spawnRate: 600 }
        };
        let currentDifficulty = 'normal';
        let timeElapsed = 0;
        let lastTime = 0;
        
        let score = 0;
        let combo = 0;
        let comboTimer = 0;
        const maxComboTimer = 3; 
        
        let screenShake = 0;
        let flashWhite = 0;

        let stars = [];
        let player;
        let projectiles = [];
        let enemies = [];
        let enemyProjectiles = [];
        let particles = [];
        let floatingTexts = [];
        let powerups = [];

        let mouseX = 0, mouseY = 0;
        let isShooting = false;
        let shootTimer = 0;

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        window.addEventListener('resize', resize);
        resize();

        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        window.addEventListener('mousedown', () => isShooting = true);
        window.addEventListener('mouseup', () => isShooting = false);
        window.addEventListener('touchstart', (e) => {
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
            isShooting = true;
        }, {passive: false});
        window.addEventListener('touchmove', (e) => {
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
            e.preventDefault();
        }, {passive: false});
        window.addEventListener('touchend', () => isShooting = false);

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            if (type === 'shoot') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'hit') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(100, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'explosion') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(100, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.3);
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'powerup') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(800, audioCtx.currentTime + 0.2);
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.2);
            }
        }

        function createStars() {
            stars = [];
            for (let i = 0; i < 150; i++) {
                stars.push({
                    x: R() * width,
                    y: R() * height,
                    size: R() * 2 + 0.5,
                    speed: (R() * 2 + 0.5) * 50
                });
            }
        }

        function initPlayer() {
            player = { x: width / 2, y: height * 0.8, vx: 0, vy: 0, hp: 100, maxHp: 100, color: '#22d3ee', size: 20, tilt: 0 };
            mouseX = player.x;
            mouseY = player.y;
        }

        function addFloatingText(x, y, text, color) {
            floatingTexts.push({ x, y, text, color, life: 1.0 });
        }

        function createSparks(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                let angle = R() * Math.PI * 2;
                let speed = R() * 200 + 50;
                particles.push({ x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, life: 1.0, color: color, size: R() * 3 + 1 });
            }
        }

        function spawnEnemy() {
            let typeRandom = R();
            let type = 'scout';
            if (typeRandom > 0.7) type = 'fighter';
            if (typeRandom > 0.95) type = 'dreadnought';

            let hp, speed, color, size;
            let diff = difficultyData[currentDifficulty];
            
            if (type === 'scout') { hp = 20; speed = 150; color = '#f87171'; size = 15; }
            else if (type === 'fighter') { hp = 50; speed = 100; color = '#fb923c'; size = 25; }
            else { hp = 200; speed = 40; color = '#c084fc'; size = 40; }

            let speedBoost = 1 + (timeElapsed / 60) * 0.5;

            enemies.push({ x: R() * (width - 60) + 30, y: -50, hp: hp * diff.hpMult, maxHp: hp * diff.hpMult, speed: speed * diff.speedMult * speedBoost, color: color, size: size, type: type, shootTimer: 0 });
        }

function updateGame(dt) {
            timeElapsed += dt;

            comboTimer -= dt;
            if (comboTimer <= 0) {
                combo = 0;
                document.getElementById('combo-display').classList.remove('combo-active');
            }

            player.vx = (mouseX - player.x) * 10;
            player.vy = (mouseY - player.y) * 10;
            player.x += player.vx * dt;
            player.y += player.vy * dt;
            player.tilt = player.vx * 0.02;

            if (player.x < player.size) player.x = player.size;
            if (player.x > width - player.size) player.x = width - player.size;
            if (player.y < player.size) player.y = player.size;
            if (player.y > height - player.size) player.y = height - player.size;

            shootTimer -= dt;
            if (isShooting && shootTimer <= 0) {
                projectiles.push({ x: player.x, y: player.y - player.size, vx: 0, vy: -800, damage: 15, color: player.color });
                playSound('shoot');
                shootTimer = 0.15;
            }

            for (let i = projectiles.length - 1; i >= 0; i--) {
                let p = projectiles[i];
                p.x += p.vx * dt;
                p.y += p.vy * dt;
                if (p.y < -10) projectiles.splice(i, 1);
            }

            for (let i = enemyProjectiles.length - 1; i >= 0; i--) {
                let p = enemyProjectiles[i];
                p.x += p.vx * dt;
                p.y += p.vy * dt;
                
                let dist = Math.hypot(p.x - player.x, p.y - player.y);
                if (dist < player.size + 5) {
                    player.hp -= 10;
                    screenShake = 10;
                    createSparks(player.x, player.y, '#fff', 10);
                    playSound('hit');
                    enemyProjectiles.splice(i, 1);
                    updateUI();
                    if (player.hp <= 0) gameOver();
                    continue;
                }
                
                if (dist < player.size + 25 && dist > player.size + 15) {
                    score += 5;
                    addFloatingText(player.x, player.y - 30, "GRAZE", "#aaa");
                }

                if (p.y > height + 10) enemyProjectiles.splice(i, 1);
            }

            for (let i = enemies.length - 1; i >= 0; i--) {
                let e = enemies[i];
                e.y += e.speed * dt;

                e.shootTimer -= dt;
                if (e.type === 'fighter' && e.shootTimer <= 0 && e.y > 0) {
                    enemyProjectiles.push({ x: e.x, y: e.y + e.size, vx: 0, vy: 300 });
                    e.shootTimer = 2;
                } else if (e.type === 'dreadnought' && e.shootTimer <= 0 && e.y > 0) {
                    enemyProjectiles.push({ x: e.x, y: e.y + e.size, vx: 0, vy: 250 });
                    enemyProjectiles.push({ x: e.x, y: e.y + e.size, vx: -100, vy: 250 });
                    enemyProjectiles.push({ x: e.x, y: e.y + e.size, vx: 100, vy: 250 });
                    e.shootTimer = 1.5;
                }

                let distToPlayer = Math.hypot(e.x - player.x, e.y - player.y);
                if (distToPlayer < e.size + player.size) {
                    player.hp -= 20;
                    e.hp = 0;
                    screenShake = 15;
                    playSound('explosion');
                    updateUI();
                    if (player.hp <= 0) gameOver();
                }

                for (let j = projectiles.length - 1; j >= 0; j--) {
                    let p = projectiles[j];
                    if (p.x > e.x - e.size && p.x < e.x + e.size && p.y > e.y - e.size && p.y < e.y + e.size) {
                        e.hp -= p.damage;
                        e.y -= 2; 
                        createSparks(p.x, p.y, e.color, 5);
                        playSound('hit');
                        projectiles.splice(j, 1);
                    }
                }

                if (e.hp <= 0) {
                    combo++;
                    comboTimer = maxComboTimer;
                    let mult = Math.min(Math.ceil(combo / 5), 5);
                    let pts = (e.type === 'scout' ? 10 : e.type === 'fighter' ? 30 : 100) * mult;
                    score += pts;
                    
                    addFloatingText(e.x, e.y, `+${pts}`, e.color);
                    
                    if (mult > 1) {
                        let cd = document.getElementById('combo-display');
                        cd.innerText = `COMBO x${mult}`;
                        cd.classList.add('combo-active');
                    }

                    createSparks(e.x, e.y, e.color, 20);
                    playSound('explosion');
                    
                    if (R() < 0.1) {
                        powerups.push({ x: e.x, y: e.y, type: R() > 0.3 ? 'health' : 'nuke', vy: 100 });
                    }
                    enemies.splice(i, 1);
                } else if (e.y > height + e.size) {
                    enemies.splice(i, 1);
                }
            }

            for (let i = powerups.length - 1; i >= 0; i--) {
                let pu = powerups[i];
                pu.y += pu.vy * dt;
                
                if (Math.hypot(pu.x - player.x, pu.y - player.y) < player.size + 15) {
                    playSound('powerup');
                    if (pu.type === 'health') {
                        player.hp = Math.min(player.maxHp, player.hp + 30);
                        addFloatingText(player.x, player.y, "+HP", "#4ade80");
                    } else if (pu.type === 'nuke') {
                        flashWhite = 1;
                        screenShake = 30;
                        addFloatingText(width/2, height/2, "NUKE!", "#fff");
                        enemies.forEach(e => { score += 10; createSparks(e.x, e.y, e.color, 15); });
                        enemies = [];
                        enemyProjectiles = [];
                    }
                    powerups.splice(i, 1);
                    updateUI();
                } else if (pu.y > height + 20) {
                    powerups.splice(i, 1);
                }
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx * dt;
                p.y += p.vy * dt;
                p.life -= dt * 2;
                if (p.life <= 0) particles.splice(i, 1);
            }

            for (let i = floatingTexts.length - 1; i >= 0; i--) {
                let ft = floatingTexts[i];
                ft.y -= 50 * dt;
                ft.life -= dt;
                if (ft.life <= 0) floatingTexts.splice(i, 1);
            }

            if (screenShake > 0) {
                screenShake -= dt * 60;
                if (screenShake < 0) screenShake = 0;
            }
            if (flashWhite > 0) {
                flashWhite -= dt;
            }

            document.getElementById('score-display').innerText = `SCORE: ${score}`;
        }

let enemySpawnTimer = 0;
        function drawGame(dt) {
            ctx.fillStyle = '#050510';
            ctx.fillRect(0, 0, width, height);

            ctx.save();
            if (screenShake > 0) {
                let dx = (R() - 0.5) * screenShake;
                let dy = (R() - 0.5) * screenShake;
                ctx.translate(dx, dy);
            }

            stars.forEach(star => {
                star.y += star.speed * dt;
                if (star.y > height) {
                    star.y = 0;
                    star.x = R() * width;
                }
                ctx.fillStyle = `rgba(255, 255, 255, ${star.speed / 150})`;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
            });

            powerups.forEach(pu => {
                ctx.shadowBlur = 15;
                ctx.shadowColor = pu.type === 'health' ? '#4ade80' : '#facc15';
                ctx.fillStyle = ctx.shadowColor;
                ctx.beginPath();
                ctx.arc(pu.x, pu.y, 10, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#000';
                ctx.font = '12px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(pu.type === 'health' ? '+' : 'O', pu.x, pu.y);
            });

            ctx.shadowBlur = 15;
            ctx.shadowColor = player.color;
            ctx.strokeStyle = player.color;
            ctx.lineWidth = 2;
            
            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.rotate(player.tilt);
            
            ctx.beginPath();
            ctx.moveTo(0, -player.size);
            ctx.lineTo(player.size, player.size);
            ctx.lineTo(player.size * 0.4, player.size * 0.5);
            ctx.lineTo(-player.size * 0.4, player.size * 0.5);
            ctx.lineTo(-player.size, player.size);
            ctx.closePath();
            ctx.fillStyle = 'rgba(34, 211, 238, 0.1)';
            ctx.fill();
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(0, -player.size * 0.2);
            ctx.lineTo(player.size * 0.2, player.size * 0.4);
            ctx.lineTo(-player.size * 0.2, player.size * 0.4);
            ctx.closePath();
            ctx.fillStyle = 'rgba(255,255,255,0.8)';
            ctx.fill();
            ctx.restore();

            projectiles.forEach(p => {
                ctx.shadowBlur = 10;
                ctx.shadowColor = p.color;
                ctx.fillStyle = '#fff';
                ctx.fillRect(p.x - 2, p.y - 10, 4, 20);
            });

            enemyProjectiles.forEach(p => {
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#f87171';
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
                ctx.fill();
            });

            enemies.forEach(e => {
                ctx.shadowBlur = 15;
                ctx.shadowColor = e.color;
                ctx.strokeStyle = e.color;
                ctx.lineWidth = 2;
                
                ctx.save();
                ctx.translate(e.x, e.y);
                ctx.rotate(Math.PI);

                ctx.beginPath();
                if (e.type === 'scout') {
                    ctx.moveTo(0, -e.size);
                    ctx.lineTo(e.size, e.size);
                    ctx.lineTo(0, e.size * 0.5);
                    ctx.lineTo(-e.size, e.size);
                } else if (e.type === 'fighter') {
                    ctx.moveTo(0, -e.size);
                    ctx.lineTo(e.size, 0);
                    ctx.lineTo(e.size, e.size);
                    ctx.lineTo(0, e.size * 0.6);
                    ctx.lineTo(-e.size, e.size);
                    ctx.lineTo(-e.size, 0);
                } else {
                    ctx.moveTo(0, -e.size);
                    ctx.lineTo(e.size, -e.size*0.5);
                    ctx.lineTo(e.size, e.size);
                    ctx.lineTo(e.size*0.5, e.size);
                    ctx.lineTo(0, e.size*0.5);
                    ctx.lineTo(-e.size*0.5, e.size);
                    ctx.lineTo(-e.size, e.size);
                    ctx.lineTo(-e.size, -e.size*0.5);
                }
                ctx.closePath();
                ctx.fillStyle = `rgba(${parseInt(e.color.slice(1,3),16)}, ${parseInt(e.color.slice(3,5),16)}, ${parseInt(e.color.slice(5,7),16)}, 0.1)`;
                ctx.fill();
                ctx.stroke();

                if (e.hp < e.maxHp) {
                    ctx.fillStyle = 'rgba(255,255,255,0.2)';
                    ctx.fillRect(-e.size, -e.size - 10, e.size * 2, 4);
                    ctx.fillStyle = '#4ade80';
                    ctx.fillRect(-e.size, -e.size - 10, (e.size * 2) * (e.hp / e.maxHp), 4);
                }
                ctx.restore();
            });

            ctx.shadowBlur = 0;
            particles.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1.0;
            });

            floatingTexts.forEach(ft => {
                ctx.fillStyle = ft.color;
                ctx.globalAlpha = ft.life;
                ctx.font = 'bold 20px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(ft.text, ft.x, ft.y);
                ctx.globalAlpha = 1.0;
            });

            ctx.restore();

            if (flashWhite > 0) {
                ctx.fillStyle = `rgba(255, 255, 255, ${flashWhite})`;
                ctx.fillRect(0, 0, width, height);
            }

            if (gameState === 'playing') {
                enemySpawnTimer -= dt * 1000;
                let rate = difficultyData[currentDifficulty].spawnRate;
                rate = Math.max(200, rate - (timeElapsed * 5));
                if (enemySpawnTimer <= 0) {
                    spawnEnemy();
                    enemySpawnTimer = rate;
                }
            }
        }

        function updateUI() {
            const bar = document.getElementById('health-bar');
            const pct = Math.max(0, (player.hp / player.maxHp) * 100);
            bar.style.width = pct + '%';
            if (pct > 50) bar.style.backgroundColor = '#4ade80';
            else if (pct > 20) bar.style.backgroundColor = '#facc15';
            else bar.style.backgroundColor = '#f87171';
        }

        function loop(timestamp) {
            let dt = (timestamp - lastTime) / 1000;
            if (dt > 0.1) dt = 0.1;
            lastTime = timestamp;

            if (gameState === 'playing') {
                updateGame(dt);
            }
            drawGame(dt);

            requestAnimationFrame(loop);
        }

        function startGame(difficulty) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            currentDifficulty = difficulty;
            gameState = 'playing';
            timeElapsed = 0;
            score = 0;
            combo = 0;
            comboTimer = 0;
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('hud').classList.remove('hidden');
            initPlayer();
            createStars();
            projectiles = [];
            enemies = [];
            enemyProjectiles = [];
            particles = [];
            floatingTexts = [];
            powerups = [];
            updateUI();
        }

        function gameOver() {
            gameState = 'menu';
            document.getElementById('main-menu').classList.remove('hidden');
            document.getElementById('hud').classList.add('hidden');
            document.getElementById('main-menu').innerHTML = `
                <h1 style="color:#f87171; text-shadow:0 0 10px #f87171;">GAME OVER</h1>
                <p style="font-size:1.5rem">SCORE: ${score}</p>
                <button class="level-btn" style="color:#22d3ee; border-color:#22d3ee;" onclick="location.reload()">RESTART</button>
            `;
        }

        createStars();
        requestAnimationFrame(loop);
    </script>
</body>
</html>
