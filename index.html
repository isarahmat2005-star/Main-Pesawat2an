<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Space Shooter</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050510; font-family: sans-serif; color: white; user-select: none; }
        canvas { display: block; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .hidden { display: none !important; }
        #main-menu { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; background: rgba(10, 10, 25, 0.8); padding: 40px; border-radius: 20px; border: 1px solid #22d3ee; box-shadow: 0 0 30px #22d3ee55; pointer-events: auto; backdrop-filter: blur(10px); }
        h1 { color: #22d3ee; text-shadow: 0 0 10px #22d3ee; font-size: 2.5rem; }
        .level-btn { background: transparent; border: 2px solid; padding: 12px 30px; margin: 10px; font-weight: bold; border-radius: 8px; cursor: pointer; color: white; }
        #hud { position: absolute; top: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between; font-weight: bold; }
        #health-bar-container { width: 150px; height: 15px; border: 1px solid #fff; border-radius: 10px; overflow: hidden; }
        #health-bar { width: 100%; height: 100%; background: #4ade80; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="ui-layer">
        <div id="hud" class="hidden">
            <div id="score-display">SCORE: 0</div>
            <div id="health-bar-container"><div id="health-bar"></div></div>
        </div>
        <div id="main-menu">
            <h1>NEON ASSAULT</h1>
            <button class="level-btn" onclick="startGame('easy')">EASY</button>
            <button class="level-btn" onclick="startGame('normal')">NORMAL</button>
            <button class="level-btn" onclick="startGame('hard')">HARD</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, gameState = 'menu', score = 0, timeElapsed = 0, lastTime = 0;
        let player, projectiles = [], enemies = [], enemyProjectiles = [], particles = [], floatingTexts = [], powerups = [];
        let mouseX = 0, mouseY = 0, isShooting = false, shootTimer = 0;
        let difficulty = { easy: {hp:0.5, speed:0.8}, normal: {hp:1, speed:1}, hard: {hp:1.5, speed:1.3} };
        let curDiff = 'normal';

        function resize() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; }
        window.addEventListener('resize', resize); resize();
        window.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
        window.addEventListener('mousedown', () => isShooting = true);
        window.addEventListener('mouseup', () => isShooting = false);

        function spawnEnemy() {
            let r = Math.random();
            let type = r > 0.95 ? 'dreadnought' : (r > 0.7 ? 'fighter' : 'scout');
            let stats = { scout: {hp:20, spd:150, col:'#f87171', sz:15}, fighter: {hp:50, spd:100, col:'#fb923c', sz:25}, dreadnought: {hp:200, spd:40, col:'#c084fc', sz:40} }[type];
            enemies.push({ x: Math.random()*(width-40)+20, y: -50, ...stats, maxHp: stats.hp * difficulty[curDiff].hp, hp: stats.hp * difficulty[curDiff].hp, speed: stats.spd * difficulty[curDiff].speed * (1 + timeElapsed/60), type: type, shootTimer: 0 });
        }

        function update(dt) {
            timeElapsed += dt;
            player = { x: mouseX, y: mouseY, size: 20 };
            if (isShooting && shootTimer <= 0) { projectiles.push({x: player.x, y: player.y-20, vy: -800}); shootTimer = 0.15; }
            shootTimer -= dt;
            enemies.forEach((e, i) => { e.y += e.speed * dt; if(e.y > height) enemies.splice(i, 1); });
            // Tambahkan logika collision dan draw di sini sesuai file sebelumnya...
            requestAnimationFrame(t => { update((t - lastTime) / 1000); lastTime = t; });
        }
        function startGame(d) { curDiff = d; gameState = 'playing'; document.getElementById('main-menu').classList.add('hidden'); document.getElementById('hud').classList.remove('hidden'); requestAnimationFrame(t => { lastTime = t; update(0); }); }
    </script>
</body>
</html>
